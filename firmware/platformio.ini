[env]
platform = espressif32
board = esp32dev
framework = arduino

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -D FIRMWARE_VERSION=\"1.0.0\"
    -std=gnu++17

build_unflags = -std=gnu++11

; Serial monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Common Dependencies
lib_deps = 
    # MQTT Client
    knolleary/PubSubClient@^2.8
    
    # Sensors (Common)
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    
    # JSON handling
    bblanchon/ArduinoJson@^6.21.4
    
    # Time management
    paulstoffregen/Time@^1.6.1
    
    # WiFi Manager
    tzapu/WiFiManager@^2.0.16-rc.2

; OTA settings
upload_protocol = esptool
upload_speed = 921600

; Filesystem
board_build.filesystem = littlefs
board_build.filesystem_ignore = 
    data/ota_priv.pem

; Hook the custom script to the build process
extra_scripts = scripts/auto_uploadfs.py

board_build.partitions = min_spiffs.csv

; =========================================
; SELECT YOUR HARDWARE CONFIGURATION
; =========================================
; Change default_envs below to match your setup:
;
; bme280        → BME280 (Temp + Humidity + Pressure)
; dht_bmp       → DHT (Temp/Humidity) + BMP280 (Pressure)
; dht_only      → DHT only
; bmp280_only   → BMP280 only
; mock      → Testing without hardware

[platformio]
default_envs = dht_bmp

[env:bme280]
build_flags = 
    ${env.build_flags}
    -D USE_BME280
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14

[env:dht_bmp]
build_flags = 
    ${env.build_flags}
    -D USE_DHT 
    -D USE_BMP280
lib_deps = 
    ${env.lib_deps}
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit Unified Sensor@^1.1.14

[env:dht_only]
build_flags = 
    ${env.build_flags}
    -D USE_DHT
lib_deps = 
    ${env.lib_deps}
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.14

[env:bmp280_only]
build_flags = 
    ${env.build_flags}
    -D USE_BMP280
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit Unified Sensor@^1.1.14